name: Signal Alert Bot

on:
  schedule:
    # Every 15 min, 03:00-10:45 UTC (~08:30-16:15 IST) covers NSE market hours, Mon-Fri.
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch: {}

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore signal state
        uses: actions/cache/restore@v4
        with:
          path: signal_state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check (single pass)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_alert_bot.py

      - name: Save signal state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: signal_state.json
          key: signal-state-${{ github.run_id }}
