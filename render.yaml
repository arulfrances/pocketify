services:
  - type: web
    name: pocketify
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.api.monitor_api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANGELONE_API_KEY
        sync: false
      - key: ANGELONE_CLIENT_CODE
        sync: false
      - key: ANGELONE_PASSWORD
        sync: false
      - key: ANGELONE_TOTP_SECRET
        sync: false
      - key: KOTAK_API_KEY
        sync: false
      - key: KOTAK_CONSUMER_SECRET
        sync: false
      - key: KOTAK_PHONE
        sync: false
      - key: KOTAK_MPIN
        sync: false
      - key: PAYTM_API_KEY
        sync: false
      - key: PAYTM_ACCESS_TOKEN
        sync: false
      - key: IND_API_KEY
        sync: false
      - key: IND_ACCESS_TOKEN
        sync: false
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_ACCESS_TOKEN
        sync: false
      - key: DHAN_CLIENT_ID
        sync: false
      - key: DHAN_ACCESS_TOKEN
        sync: false
